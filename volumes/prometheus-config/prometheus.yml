global:
  scrape_interval:     15s
  evaluation_interval: 15s

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
      monitor: 'example'

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets: ['localhost:9093']

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 15s
    scrape_timeout: 15s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'trafficMetrics_CCR1016'
    scrape_interval: 75s
    scrape_timeout: 60s
    static_configs:
      - targets:
          - 10.10.10.1
    metrics_path: /snmp
    params:
      auth: [CCR1016_v2]
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  - job_name: 'detailedMetrics_CCR1016'
    scrape_interval: 157s
    scrape_timeout: 140s
    static_configs:
      - targets:
          - 10.10.10.1
    metrics_path: /snmp
    params:
      auth: [CCR1016_v2]
      module: [mikrotik]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  - job_name: 'staticMetrics_CCR1016'
    scrape_interval: 189s
    scrape_timeout: 30s
    static_configs:
      - targets:
          - 10.10.10.1
    metrics_path: /snmp
    params:
      auth: [CCR1016_v2]
      module: [hrDevice, hrStorage, hrSystem]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  - job_name: 'trafficMetrics_CRS326'
